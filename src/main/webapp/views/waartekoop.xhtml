<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                template="/templates/homepage.xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">
        <style>
            .seller-grid .ui-datagrid-content {
                border: none;
            }
            .seller-card {
                margin: 10px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 100%;
            }
            .seller-card .ui-card-body {
                padding: 1.5rem;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                text-align: center;
            }
            .seller-card .ui-card-title {
                font-size: 1.2rem;
                color: #91a63d;
                margin-top: 10px;
            }
            .seller-card .ui-card-content {
                flex-grow: 1;
                padding: 0;
            }
            .seller-logo {
                height: 80px;
                width: auto;
                max-width: 100%;
                object-fit: contain;
                margin-bottom: 15px;
            }
            .seller-address {
                color: #555;
                margin-bottom: 15px;
            }
            .seller-website {
                margin-top: auto;
            }
        </style>

        <h1 style="text-align: center; color: #91a63d; margin-bottom: 30px;">Waar te koop</h1>

        <p:dataGrid var="seller" value="#{waarTeKoopBean.sellers}" columns="3" layout="grid"
                    styleClass="seller-grid"
                    paginator="false" rows="18">

            <p:card styleClass="seller-card">
                <f:facet name="header">
                    <h:graphicImage library="images" name="logos/#{seller.logo}" styleClass="seller-logo" alt="#{seller.name} logo"/>
                </f:facet>
                <f:facet name="title">
                    #{seller.name}
                </f:facet>

                <div class="seller-address">
                    #{seller.street}<br/>
                    #{seller.city}
                </div>

                <div class="seller-website">
                    <p:button value="#{seller.websiteDisplay}" href="http://#{seller.website}" target="_blank"
                              icon="pi pi-external-link" styleClass="ui-button-outlined" />
                </div>
            </p:card>

        </p:dataGrid>
    </ui:define>

</ui:composition>
